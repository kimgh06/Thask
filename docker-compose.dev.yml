services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: thask
      POSTGRES_PASSWORD: thask_dev_password
      POSTGRES_DB: thask
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    ports:
      - "7242:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thask"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata_dev:
