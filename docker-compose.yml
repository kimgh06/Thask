services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "7243:3000"
    environment:
      DATABASE_URL: postgresql://thask:${POSTGRES_PASSWORD:-thask_password}@db:5432/thask
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: ${APP_URL:-http://localhost:7243}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: thask
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-thask_password}
      POSTGRES_DB: thask
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "7242:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thask"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
